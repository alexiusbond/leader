[main]
jdbcRealm = org.apache.shiro.realm.jdbc.JdbcRealm
jdbcRealm.permissionsLookupEnabled = true
jdbcRealm.authenticationQuery = SELECT t.password FROM (SELECT login, password FROM employee AS e LEFT JOIN hr_employee_order AS eo ON eo.employee_id = e.id AND eo.to_date IS NULL LEFT JOIN hr_orders AS ord ON ord.id = eo.hr_orders_id WHERE (ord.working_status_id = 2 OR ord.working_status_id = 5) UNION SELECT login, password FROM api_users) t WHERE t.login = ?
jdbcRealm.userRolesQuery = SELECT role_name FROM user_roles WHERE login = ?
jdbcRealm.permissionsQuery = SELECT permissions FROM user_permission WHERE role_name = ?
sha256Matcher = org.apache.shiro.authc.credential.Sha256CredentialsMatcher
jdbcRealm.credentialsMatcher = $sha256Matcher
ds = org.apache.commons.dbcp.BasicDataSource
ds.driverClassName=com.mysql.cj.jdbc.Driver
ds.validationQuery = SELECT 1
ds.testWhileIdle = true 
ds.testOnReturn = true
ds.removeAbandoned = true
ds.removeAbandonedTimeout = 30
ds.maxIdle = 30
ds.maxWait = 10000
ds.url=jdbc:mysql://localhost:3306/spt?autoReconnect=true&useTimezone=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Bishkek
ds.username = spt
ds.password = Sa2017paT#
jdbcRealm.dataSource=$ds
